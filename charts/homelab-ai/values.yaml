# =============================================================================
# homelab-ai — Global Values
# =============================================================================
# Node selectors use the proxmox-host label applied to each k8s node.
# Run: kubectl label node <node-name> proxmox-host=pve1
#                         kubectl label node <node-name> proxmox-host=pve2

global:
  # Namespace to deploy everything into
  namespace: homelab-ai

  # Storage class for all PVCs (override per-component if needed)
  # "local-path" is the k3s default; swap to your Longhorn/NFS class if desired
  storageClass: local-path

  # Node label key used to pin workloads to specific Proxmox hosts
  nodeLabelKey: proxmox-host

  # Node label values for each host
  pve1: pve1   # Primary: hot inference, vector DB, Postgres, Redis
  pve2: pve2   # Compute: embeddings, summarizer, background workers

  # GIDs that grant access to /dev/dri/* on the k3s nodes.
  # Confirmed via: getent group render video   (on k3s-worker-node-1 and k3s-worker-node-3)
  gpuGroups:
    - 44   # video
    - 993  # render (confirmed on these nodes)

# =============================================================================
# LLM — Main coding / chat model
# Runs on pve1 (Intel Arc B580 12GB)
# Served via Ollama. Model files live on pve1 SATA SSD (mounted as PVC).
# =============================================================================
llm:
  enabled: true

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  # Port the Ollama API listens on
  port: 11434

  # Default model — qwen2.5-coder:14b fits fully in Arc B580 12GB VRAM (~8.5GB Q4_K_M).
  # 32B requires ~19GB and will partially offload to CPU RAM (slow).
  # Pull models manually: kubectl exec -n homelab-ai deploy/llm -- ollama pull qwen2.5-coder:14b
  defaultModel: "qwen2.5-coder:14b"

  # Resource requests/limits
  # Leave limits unset to let the container use all available GPU memory
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "24Gi"
      # gpu.intel.com/xe: 1

  # PVC for model files — mounted on SATA SSD via local-path
  storage:
    enabled: true
    size: 200Gi
    storageClass: ""   # inherits global.storageClass if empty
    mountPath: /root/.ollama

  # Environment variables
  env:
    - name: OLLAMA_HOST
      value: "0.0.0.0:11434"
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:0"
    - name: OLLAMA_NUM_GPU
      value: "999"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"

  # Node scheduling — pin to pve1
  nodeSelector: {}   # populated via _helpers.tpl using global.pve1

  # Pod-level tolerations if nodes are tainted
  tolerations: []

  # Liveness / readiness probes
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# Embeddings — Text embedding service
# Runs on pve2 (Intel Arc A380 6GB)
# Uses a lightweight Ollama instance with an embedding model.
# Keeps inference traffic off pve1 for background indexing tasks.
# =============================================================================
embeddings:
  enabled: true

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  port: 11435

  defaultModel: "nomic-embed-text"

  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
      # gpu.intel.com/xe: 1

  storage:
    enabled: true
    size: 20Gi
    storageClass: ""
    mountPath: /root/.ollama

  # OLLAMA_HOST for embeddings is set by the deployment template (includes port 11435).
  # Do not set it here — it would create a duplicate env var.
  env:
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:0"
    - name: OLLAMA_NUM_GPU
      value: "999"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"

  # Pin to pve2
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# Summarizer — Compaction / long-context summarizer
# Runs on pve2 (offloads compression work from pve1)
# Separate Ollama instance with a smaller, fast model.
# =============================================================================
summarizer:
  enabled: true

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  port: 11436

  defaultModel: "qwen2.5:7b"

  env:
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:0"
    - name: OLLAMA_NUM_GPU
      value: "999"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"

  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
      # gpu.intel.com/xe: 1

  storage:
    enabled: true
    size: 30Gi
    storageClass: ""
    mountPath: /root/.ollama

  # Pin to pve2
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# VectorDB — Qdrant vector database
# Runs on pve1 NVMe for fast ANN search
# =============================================================================
vectordb:
  enabled: true

  image:
    repository: qdrant/qdrant
    tag: v1.13.4
    pullPolicy: IfNotPresent

  port: 6333
  grpcPort: 6334

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  storage:
    enabled: true
    # Place on pve1 NVMe — use a dedicated storage class if you have one,
    # otherwise local-path will bind to wherever the pod schedules (pve1).
    size: 100Gi
    storageClass: ""
    mountPath: /qdrant/storage

  env: []

  # Pin to pve1
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 30
      path: /healthz
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      path: /readyz

# =============================================================================
# Postgres — Metadata / session / memory store
# Runs on pve1 NVMe
# =============================================================================
postgres:
  enabled: true

  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent

  port: 5432

  # Database credentials — override in a sealed-secret or values-secret.yaml
  auth:
    database: homelab_ai
    username: aiuser
    # Password is set via a Kubernetes Secret (see templates/postgres/secret.yaml)
    # Set this in a values-secret.yaml that is NOT committed to git:
    #   postgres:
    #     auth:
    #       password: "your-password-here"
    password: "changeme"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "4"
      memory: "8Gi"

  storage:
    enabled: true
    size: 50Gi
    storageClass: ""
    mountPath: /var/lib/postgresql/data
    # Postgres requires a subdirectory inside the mount to avoid permission issues
    subPath: pgdata

  env:
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata

  # Pin to pve1
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5

# =============================================================================
# Redis — Cache / session state / pub-sub
# Runs on pve1 NVMe
# =============================================================================
redis:
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  port: 6379

  # Optional: set a password via requirepass
  auth:
    enabled: false
    password: ""

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "4Gi"

  storage:
    enabled: true
    size: 10Gi
    storageClass: ""
    mountPath: /data

  # Extra redis.conf args appended to the command
  extraArgs: "--save 60 1 --loglevel notice"

  # Pin to pve1
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5

# =============================================================================
# Open WebUI — Chat interface for Ollama
# Runs on pve2 apps node (k3s-worker-node-2)
# Exposed via MetalLB LoadBalancer for LAN access.
# Connects to the LLM service internally at http://llm:11434
# =============================================================================
openwebui:
  enabled: true

  image:
    repository: ghcr.io/open-webui/open-webui
    tag: main
    pullPolicy: IfNotPresent

  port: 8080

  # Internal URL of the Ollama LLM service
  ollamaBaseUrl: "http://llm:11434"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

  storage:
    enabled: true
    size: 5Gi
    storageClass: ""
    mountPath: /app/backend/data

  env:
    # RAG web search via SearXNG (self-hosted, no API key needed)
    - name: ENABLE_RAG_WEB_SEARCH
      value: "true"
    - name: RAG_WEB_SEARCH_ENGINE
      value: "searxng"
    - name: SEARXNG_QUERY_URL
      value: "http://searxng:8080/search?q=<query>&format=json"
    # Use the dedicated embeddings service for RAG document indexing
    - name: RAG_EMBEDDING_ENGINE
      value: "ollama"
    - name: RAG_EMBEDDING_MODEL
      value: "nomic-embed-text"
    - name: OLLAMA_BASE_URL
      value: "http://llm:11434"
    - name: RAG_OLLAMA_BASE_URL
      value: "http://embeddings:11435"

  # Pin to pve2 apps node (k3s-worker-node-2)
  nodeSelector: {}

  tolerations: []

# =============================================================================
# SearXNG — Self-hosted metasearch engine
# Runs on pve2 apps node (k3s-worker-node-2)
# Provides web search for OpenWebUI RAG without external API keys.
# JSON format is enabled so OpenWebUI can query it programmatically.
# =============================================================================
searxng:
  enabled: true

  image:
    repository: searxng/searxng
    tag: latest
    pullPolicy: IfNotPresent

  port: 8080

  # Secret key is stored in a SealedSecret (templates/searxng/sealed-secret.yaml).
  # Set this only for local helm template testing — never commit a real value here.
  secretKey: ""

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  # Pin to pve2 apps node (k3s-worker-node-2)
  nodeSelector: {}

  tolerations: []
