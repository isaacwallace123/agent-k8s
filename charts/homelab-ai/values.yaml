# =============================================================================
# homelab-ai — Global Values
# =============================================================================
# Node selectors use the proxmox-host label applied to each k8s node.
# Run: kubectl label node <node-name> proxmox-host=pve1
#                         kubectl label node <node-name> proxmox-host=pve2

global:
  # Namespace to deploy everything into
  namespace: homelab-ai

  # Storage class for all PVCs (override per-component if needed)
  # "local-path" is the k3s default; swap to your Longhorn/NFS class if desired
  storageClass: local-path

  # Node label key used to pin workloads to specific Proxmox hosts
  nodeLabelKey: proxmox-host

  # Node label values for each host
  pve1: pve1   # Primary: hot inference, vector DB, Postgres, Redis
  pve2: pve2   # Compute: embeddings, summarizer, background workers

  # GIDs that grant access to /dev/dri/* on the k3s nodes.
  # Confirmed via: getent group render video   (on k3s-worker-node-1 and k3s-worker-node-3)
  gpuGroups:
    - 44   # video
    - 993  # render (confirmed on these nodes)

# =============================================================================
# LLM — Finance AI — occasional use, strong math/reasoning
# Runs on pve1 (Intel Arc B580 12GB)
# Served via Ollama. Model files live on pve1 SATA SSD (mounted as PVC).
# =============================================================================
llm:
  enabled: true

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  # Port the Ollama API listens on
  port: 11434

  # Default model for Overwatch analysis.
  # Pull: kubectl exec -n homelab-ai deploy/llm -- ollama pull qwen2.5:14b
  defaultModel: "qwen2.5:14b"

  # Resource requests/limits
  resources:
    requests:
      cpu: "4"
      memory: "16Gi"
    limits:
      cpu: "16"    # 13700KF has 16 threads — available for KV cache spill beyond 16K ctx
      memory: "44Gi"  # allows 16K in VRAM + large context spill into 48GB DDR4
      # gpu.intel.com/xe: 1

  # PVC for model files — mounted on SATA SSD via local-path
  storage:
    enabled: true
    size: 200Gi
    storageClass: ""   # inherits global.storageClass if empty
    mountPath: /root/.ollama

  # Environment variables
  env:
    - name: OLLAMA_HOST
      value: "0.0.0.0:11434"
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:0"
    - name: OLLAMA_NUM_GPU
      value: "999"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"
    # Keep model loaded forever — eliminates cold-start reload penalty
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    # Dedicate all VRAM to a single request (single-user homelab)
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    # Prevent two models from splitting VRAM simultaneously
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    # Hardware-accelerated attention on Intel Arc
    - name: OLLAMA_FLASH_ATTENTION
      value: "1"
    # Persist compiled SYCL/oneAPI GPU kernels — avoids recompile on pod restart
    - name: SYCL_CACHE_PERSISTENT
      value: "1"
    # Store SYCL kernel cache on the model PVC so it survives pod restarts
    - name: SYCL_CACHE_DIR
      value: "/root/.ollama/.sycl-cache"
    # Halve KV cache VRAM usage — 14b models get ~16K ctx fully in VRAM (3.5GB free)
    # Overflow beyond that spills to 48GB DDR4 via 13700KF — still fast
    - name: OLLAMA_KV_CACHE_TYPE
      value: "q8_0"
    # Lock context window — prevents model reload when pipeline requests num_ctx=16384
    # Without this, Ollama reloads the full model (~20s SYCL init) on every context mismatch
    - name: OLLAMA_CONTEXT_LENGTH
      value: "16384"

  # Node scheduling — pin to pve1
  nodeSelector: {}   # populated via _helpers.tpl using global.pve1

  # Pod-level tolerations if nodes are tainted
  tolerations: []

  # Liveness / readiness probes
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# Coding — Primary coding / planning model
# Runs on pve1 (Intel Arc B50 Pro 16GB)
# qwen2.5-coder:14b at Q8 fits entirely in 16GB VRAM — zero system RAM spill.
# Also serves as the portfolio insight model via Open WebUI system prompts.
# =============================================================================
coding:
  enabled: true

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  port: 11437

  defaultModel: "qwen2.5-coder:14b"

  resources:
    requests:
      cpu: "4"
      memory: "16Gi"
    limits:
      cpu: "16"    # 13700KF has 16 threads — shared with finance pod (different GPU, same node)
      memory: "32Gi"  # Q8 14b ~15GB VRAM, minimal KV spill needed
      # gpu.intel.com/xe: 1

  storage:
    enabled: true
    size: 100Gi
    storageClass: ""
    mountPath: /root/.ollama

  env:
    - name: OLLAMA_HOST
      value: "0.0.0.0:11437"
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:1"   # B50 Pro is second GPU on pve1 — verify with: clinfo or xpu-smi
    # XMX SDP kernel (sdp_xmx_kernel.cpp) crashes on B50 Pro (Battlemage/xe2) in current IPEX-LLM image.
    # Force CPU inference until a fixed image is available.
    - name: OLLAMA_NUM_GPU
      value: "0"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: SYCL_CACHE_PERSISTENT
      value: "1"
    - name: SYCL_CACHE_DIR
      value: "/root/.ollama/.sycl-cache"
    - name: OLLAMA_KV_CACHE_TYPE
      value: "q8_0"
    - name: OLLAMA_CONTEXT_LENGTH
      value: "16384"

  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# Embeddings — Text embedding service
# Runs on pve2 (Intel Arc A380 6GB)
# Uses a lightweight Ollama instance with an embedding model.
# Keeps inference traffic off pve1 for background indexing tasks.
# =============================================================================
embeddings:
  enabled: true

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  port: 11435

  defaultModel: "nomic-embed-text"

  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
      # gpu.intel.com/xe: 1

  storage:
    enabled: true
    size: 20Gi
    storageClass: ""
    mountPath: /root/.ollama

  # OLLAMA_HOST for embeddings is set by the deployment template (includes port 11435).
  # Do not set it here — it would create a duplicate env var.
  env:
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:0"
    - name: OLLAMA_NUM_GPU
      value: "999"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: OLLAMA_FLASH_ATTENTION
      value: "1"
    - name: SYCL_CACHE_PERSISTENT
      value: "1"
    # 7b models have tiny KV caches (~28KB/token) — q8_0 barely needed but consistent
    - name: OLLAMA_KV_CACHE_TYPE
      value: "q8_0"

  # Pin to pve2
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# Summarizer — Compaction / long-context summarizer
# Runs on pve2 (offloads compression work from pve1)
# Separate Ollama instance with a smaller, fast model.
# =============================================================================
summarizer:
  enabled: false

  image:
    repository: intelanalytics/ipex-llm-inference-cpp-xpu
    tag: latest
    pullPolicy: IfNotPresent

  port: 11436

  defaultModel: "qwen2.5:7b"

  env:
    - name: ONEAPI_DEVICE_SELECTOR
      value: "level_zero:0"
    - name: OLLAMA_NUM_GPU
      value: "999"
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: no_proxy
      value: "localhost,127.0.0.1"
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: OLLAMA_FLASH_ATTENTION
      value: "1"
    - name: SYCL_CACHE_PERSISTENT
      value: "1"
    # Store SYCL kernel cache on the model PVC so it survives pod restarts
    - name: SYCL_CACHE_DIR
      value: "/root/.ollama/.sycl-cache"
    # A380 has a driver bug with SYCL command graph execution — must stay disabled
    # DISABLE_OPT=0: safe to enable (fused ops, memory layout optimizations)
    - name: GGML_SYCL_DISABLE_GRAPH
      value: "1"
    - name: GGML_SYCL_DISABLE_OPT
      value: "0"
    # 7b/3b models have tiny KV caches — q8_0 barely needed but consistent
    - name: OLLAMA_KV_CACHE_TYPE
      value: "q8_0"
    # Vision calls use num_ctx=8192 — lock to prevent reload on context mismatch
    - name: OLLAMA_CONTEXT_LENGTH
      value: "8192"

  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
    limits:
      cpu: "6"     # R5 5500 has 6 threads — use them all for KV cache spill to RAM
      memory: "28Gi"  # headroom for large context KV cache overflow into 32GB DDR4
      # gpu.intel.com/xe: 1

  storage:
    enabled: true
    size: 30Gi
    storageClass: ""
    mountPath: /root/.ollama

  # Pin to pve2
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
      path: /api/tags
    readiness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      path: /api/tags

# =============================================================================
# VectorDB — Qdrant vector database
# Runs on pve1 NVMe for fast ANN search
# =============================================================================
vectordb:
  enabled: false

  image:
    repository: qdrant/qdrant
    tag: v1.13.4
    pullPolicy: IfNotPresent

  port: 6333
  grpcPort: 6334

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  storage:
    enabled: true
    # Place on pve1 NVMe — use a dedicated storage class if you have one,
    # otherwise local-path will bind to wherever the pod schedules (pve1).
    size: 100Gi
    storageClass: ""
    mountPath: /qdrant/storage

  env: []

  # Pin to pve1
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 30
      path: /healthz
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      path: /readyz

# =============================================================================
# Postgres — Metadata / session / memory store
# Runs on pve1 NVMe
# =============================================================================
postgres:
  enabled: true

  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent

  port: 5432

  # Database credentials — override in a sealed-secret or values-secret.yaml
  auth:
    database: homelab_ai
    username: aiuser
    # Password is set via a Kubernetes Secret (see templates/postgres/secret.yaml)
    # Set this in a values-secret.yaml that is NOT committed to git:
    #   postgres:
    #     auth:
    #       password: "your-password-here"
    password: "changeme"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "4"
      memory: "8Gi"

  storage:
    enabled: true
    size: 50Gi
    storageClass: ""
    mountPath: /var/lib/postgresql/data
    # Postgres requires a subdirectory inside the mount to avoid permission issues
    subPath: pgdata

  env:
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata

  # Pin to pve1
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 30
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5

# =============================================================================
# Redis — Cache / session state / pub-sub
# Runs on pve1 NVMe
# =============================================================================
redis:
  enabled: true

  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent

  port: 6379

  # Optional: set a password via requirepass
  auth:
    enabled: false
    password: ""

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "2"
      memory: "4Gi"

  storage:
    enabled: true
    size: 10Gi
    storageClass: ""
    mountPath: /data

  # Extra redis.conf args appended to the command
  extraArgs: "--save 60 1 --loglevel notice"

  # Pin to pve1
  nodeSelector: {}

  tolerations: []

  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5

# =============================================================================
# Open WebUI — Chat interface for Ollama
# Runs on pve2 apps node (k3s-worker-node-2)
# Exposed via MetalLB LoadBalancer for LAN access.
#
# Ollama connections (semicolon-separated = both appear in UI automatically):
#   coding:11437  — primary: coding / planning / portfolio insights (B50 Pro)
#   llm:11434     — secondary: finance AI (B580)
# =============================================================================
openwebui:
  enabled: true

  image:
    repository: ghcr.io/open-webui/open-webui
    tag: main
    pullPolicy: IfNotPresent

  port: 8080

  # Semicolon-separated Ollama URLs — Open WebUI registers both automatically
  ollamaBaseUrl: "http://coding:11437;http://llm:11434"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

  storage:
    enabled: true
    size: 5Gi
    storageClass: ""
    mountPath: /app/backend/data

  env:
    # Web search via SearXNG (v0.8.x env var names)
    - name: ENABLE_WEB_SEARCH
      value: "true"
    - name: WEB_SEARCH_ENGINE
      value: "searxng"
    - name: SEARXNG_QUERY_URL
      value: "http://searxng:8080/search?q=<query>&format=json"
    # Embeddings via dedicated A380 service for RAG document indexing
    - name: RAG_EMBEDDING_ENGINE
      value: "ollama"
    - name: RAG_EMBEDDING_MODEL
      value: "nomic-embed-text"
    - name: RAG_OLLAMA_BASE_URL
      value: "http://embeddings:11435"
    # Default to coding model for new chats
    - name: DEFAULT_MODELS
      value: "qwen2.5-coder:14b"
    # Disable the default OpenAI API connection — we use Ollama only
    - name: ENABLE_OPENAI_API
      value: "false"
    # Disable sign-ups — single user homelab
    - name: ENABLE_SIGNUP
      value: "false"
    # Allow embedding service to be called cross-origin
    - name: CORS_ALLOW_ORIGIN
      value: "*"

  # Admin credentials are stored in the openwebui-admin-secret SealedSecret
  # (templates/openwebui/sealed-secret.yaml) — no plaintext values needed here.

  # Pin to pve2 apps node (k3s-worker-node-2)
  nodeSelector: {}

  tolerations: []

# =============================================================================
# Pipelines — OpenWebUI multi-model chaining middleware
# Runs on pve2 apps node (k3s-worker-node-2)
#
# Exposes an OpenAI-compatible API at port 9099.
# Connect in OpenWebUI: Admin → Settings → Connections → OpenAI API
#   URL: http://pipelines:9099   Key: (pipelines.apiKey value below)
#
# Included pipelines:
#   Coding Pipeline  — deepseek-r1:7b plans → qwen2.5-coder:14b implements
#   Vision Pipeline  — qwen2.5vl:7b describes image → deepseek-r1:14b reasons
# =============================================================================
pipelines:
  enabled: false

  image:
    repository: ghcr.io/open-webui/pipelines
    tag: main
    pullPolicy: IfNotPresent

  port: 9099

  # API key OpenWebUI uses to authenticate with the pipelines service.
  # Enter this same value in OpenWebUI when adding the connection.
  apiKey: "homelab-pipelines-key"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

  storage:
    size: 5Gi
    storageClass: ""

  # Pin to pve2 apps node (k3s-worker-node-2)
  nodeSelector: {}

  tolerations: []

# =============================================================================
# SearXNG — Self-hosted metasearch engine
# Runs on pve2 apps node (k3s-worker-node-2)
# Provides web search for OpenWebUI RAG without external API keys.
# JSON format is enabled so OpenWebUI can query it programmatically.
# =============================================================================
searxng:
  enabled: true

  image:
    repository: searxng/searxng
    tag: latest
    pullPolicy: IfNotPresent

  port: 8080

  # Secret key is stored in a SealedSecret (templates/searxng/sealed-secret.yaml).
  # Set this only for local helm template testing — never commit a real value here.
  secretKey: ""

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  # Pin to pve2 apps node (k3s-worker-node-2)
  nodeSelector: {}

  tolerations: []

# =============================================================================
# Overwatch — AI cluster monitoring service
# Continuously collects pod/node/metric data, runs LLM analysis every N minutes,
# stores insights in Postgres, and exposes a REST API for the portfolio to consume.
# =============================================================================
overwatch:
  enabled: true

  image:
    repository: ghcr.io/isaacwallace123/overwatch
    tag: latest
    pullPolicy: Always

  port: 8000

  # How often to run an analysis cycle (seconds)
  intervalSeconds: 300

  # Prometheus endpoint for metric queries
  prometheusUrl: "http://prometheus.monitoring:9090"

  # Ollama LLM endpoint and model for analysis
  ollamaUrl: "http://coding:11437"
  model: "qwen2.5-coder:14b"

  # Postgres connection string for storing insight history.
  # Override in values-secret.yaml (not committed to git):
  #   overwatch:
  #     databaseUrl: "postgresql://aiuser:password@postgres:5432/homelab_ai"
  databaseUrl: ""

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  nodeSelector: {}
  tolerations: []
