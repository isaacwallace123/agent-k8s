{{- if .Values.vectordb.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: vectordb
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: vectordb
spec:
  type: ClusterIP
  selector:
    {{- include "homelab-ai.selectorLabels" (dict "component" "vectordb" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.vectordb.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.vectordb.grpcPort }}
      targetPort: grpc
      protocol: TCP
{{- end }}
