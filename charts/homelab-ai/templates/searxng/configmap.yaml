{{- if .Values.searxng.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
data:
  settings.yml: |
    use_default_settings: true

    server:
      secret_key: {{ .Values.searxng.secretKey | quote }}
      limiter: false
      image_proxy: false
      port: {{ .Values.searxng.port }}
      bind_address: "0.0.0.0"

    ui:
      static_use_hash: true

    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "en"
      # JSON format must be explicitly enabled — disabled by default for security.
      # OpenWebUI requires it for web search integration.
      formats:
        - html
        - json
{{- end }}
