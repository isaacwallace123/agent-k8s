{{- if .Values.searxng.enabled }}
---
# SearXNG session signing key.
# This file is a PLACEHOLDER — do not commit the real value.
# Steps to create the SealedSecret:
#   1. kubectl create secret generic searxng-secret \
#        --namespace homelab-ai \
#        --from-literal=secret-key="$(openssl rand -hex 32)" \
#        --dry-run=client -o yaml \
#      | kubeseal --controller-namespace secrets --format yaml \
#      > templates/searxng/sealed-secret.yaml
#   2. Delete this file (secret.yaml) and commit sealed-secret.yaml instead.
#
# For now this renders an empty placeholder so the deployment can reference
# the secret name without error. Replace with a SealedSecret before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: searxng-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: searxng
type: Opaque
stringData:
  secret-key: {{ .Values.searxng.secretKey | quote }}
{{- end }}
