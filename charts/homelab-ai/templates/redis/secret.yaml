{{- if and .Values.redis.enabled .Values.redis.auth.enabled }}
---
# Redis credentials Secret — only created when redis.auth.enabled = true.
# Set redis.auth.password in a gitignored values-secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}
{{- end }}
