{{- if .Values.pipelines.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipelines-code
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipelines
data:

  # ===========================================================================
  # Chat Pipeline — fast conversational chat with optional image support
  # No image: qwen2.5:7b (single call)
  # With image: qwen2.5vl:3b answers directly (single call)
  # ===========================================================================
  chat_pipeline.py: |
    import base64
    from typing import List
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            chat_url: str = "http://summarizer:11436"
            chat_model: str = "qwen2.5:7b"
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"

        def __init__(self):
            self.name = "Chat Pipeline (Vision → Chat)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        async def _emit(self, emitter, description, done=False):
            if emitter:
                await emitter({"type": "status", "data": {"description": description, "done": done}})

        async def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> str:
            images = self._resolve_images(messages)
            clean_history = self._sanitize_messages(messages[:-1])
            system = {"role": "system", "content": "You are a helpful, friendly assistant. Answer clearly and conversationally."}

            if images:
                await self._emit(__event_emitter__, "Analyzing image...")
                resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [system] + clean_history + [
                            {"role": "user", "content": user_message, "images": images}
                        ],
                        "stream": False
                    },
                    timeout=120
                )
            else:
                await self._emit(__event_emitter__, "Thinking...")
                resp = requests.post(
                    self.valves.chat_url + "/api/chat",
                    json={
                        "model": self.valves.chat_model,
                        "messages": [system] + clean_history + [
                            {"role": "user", "content": user_message}
                        ],
                        "stream": False
                    },
                    timeout=300
                )

            data = resp.json()
            if "message" not in data:
                await self._emit(__event_emitter__, "Error", done=True)
                return f"Error: {data.get('error', str(data))}"
            await self._emit(__event_emitter__, "Done", done=True)
            return data["message"]["content"]

  # ===========================================================================
  # Coding Pipeline
  # No image:    deepseek-r1:7b plans → qwen2.5-coder:14b implements
  # With image:  qwen2.5vl:3b describes → qwen2.5-coder:14b implements
  # ===========================================================================
  coding_pipeline.py: |
    import base64
    from typing import List
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"
            planner_url: str = "http://summarizer:11436"
            planner_model: str = "deepseek-r1:7b"
            coder_url: str = "http://llm:11434"
            coder_model: str = "qwen2.5-coder:14b"

        def __init__(self):
            self.name = "Coding Pipeline (Vision → Plan → Code)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        async def _emit(self, emitter, description, done=False):
            if emitter:
                await emitter({"type": "status", "data": {"description": description, "done": done}})

        async def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> str:
            images = self._resolve_images(messages)

            if images:
                await self._emit(__event_emitter__, "Analyzing image...")
                vision_resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [{
                            "role": "user",
                            "content": (
                                "Describe this image in full technical detail for a software developer. "
                                "Include all visible code, UI elements, error messages, diagrams, and text. "
                                "Task: " + user_message
                            ),
                            "images": images
                        }],
                        "stream": False
                    },
                    timeout=120
                )
                vision_data = vision_resp.json()
                if "message" not in vision_data:
                    await self._emit(__event_emitter__, "Error", done=True)
                    return f"Vision error: {vision_data.get('error', str(vision_data))}"
                code_input = "Image context:\n" + vision_data["message"]["content"] + "\n\nTask: " + user_message
            else:
                await self._emit(__event_emitter__, "Planning...")
                plan_resp = requests.post(
                    self.valves.planner_url + "/api/chat",
                    json={
                        "model": self.valves.planner_model,
                        "messages": [
                            {
                                "role": "system",
                                "content": (
                                    "You are a senior software architect. "
                                    "Given a coding task, produce a concise numbered implementation plan. "
                                    "Do not write code — only plan the approach and structure."
                                )
                            },
                            {"role": "user", "content": user_message}
                        ],
                        "stream": False
                    },
                    timeout=120
                )
                plan_data = plan_resp.json()
                if "message" not in plan_data:
                    await self._emit(__event_emitter__, "Error", done=True)
                    return f"Planner error: {plan_data.get('error', str(plan_data))}"
                code_input = "Task: " + user_message + "\n\nImplementation Plan:\n" + plan_data["message"]["content"]

            await self._emit(__event_emitter__, "Coding...")
            code_resp = requests.post(
                self.valves.coder_url + "/api/chat",
                json={
                    "model": self.valves.coder_model,
                    "messages": [
                        {
                            "role": "system",
                            "content": (
                                "You are an expert programmer. "
                                "Implement the solution according to the provided context. "
                                "Write complete, working code with clear comments."
                            )
                        },
                        {"role": "user", "content": code_input}
                    ],
                    "stream": False
                },
                timeout=300
            )
            code_data = code_resp.json()
            if "message" not in code_data:
                await self._emit(__event_emitter__, "Error", done=True)
                return f"Coder error: {code_data.get('error', str(code_data))}"
            await self._emit(__event_emitter__, "Done", done=True)
            return code_data["message"]["content"]

  # ===========================================================================
  # Finance Pipeline
  # With image: single vision call (analyze + search query) → web search → reasoning
  # No image:   use user message as search query → web search → reasoning
  # ===========================================================================
  finance_pipeline.py: |
    import base64
    from typing import List
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "deepseek-r1:14b"
            searxng_url: str = "http://searxng:8080/search"
            search_results: int = 5

        def __init__(self):
            self.name = "Finance Pipeline (Vision → Analysis)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def _web_search(self, query: str) -> str:
            try:
                resp = requests.get(
                    self.valves.searxng_url,
                    params={"q": query, "format": "json", "categories": "news,general"},
                    timeout=10
                )
                results = resp.json().get("results", [])[:self.valves.search_results]
                if not results:
                    return "No web results found."
                lines = []
                for r in results:
                    title = r.get("title", "")
                    content = r.get("content", "")
                    url = r.get("url", "")
                    lines.append(f"- {title}: {content} ({url})")
                return "\n".join(lines)
            except Exception as e:
                return f"Search failed: {e}"

        async def _emit(self, emitter, description, done=False):
            if emitter:
                await emitter({"type": "status", "data": {"description": description, "done": done}})

        async def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> str:
            images = self._resolve_images(messages)
            clean_history = self._sanitize_messages(messages[:-1])

            image_analysis = ""
            search_query = user_message

            if images:
                await self._emit(__event_emitter__, "Analyzing chart...")
                vision_resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [{
                            "role": "user",
                            "content": (
                                "Analyze this financial chart and respond in exactly two sections:\n\n"
                                "ANALYSIS: <concise analysis — ticker/company, current price, trend, key indicators>\n\n"
                                "SEARCH_QUERY: <one web search query to find current news and analyst sentiment>\n\n"
                                f"User question: {user_message}"
                            ),
                            "images": images
                        }],
                        "stream": False
                    },
                    timeout=120
                )
                vision_data = vision_resp.json()
                if "message" not in vision_data:
                    await self._emit(__event_emitter__, "Error", done=True)
                    return f"Vision error: {vision_data.get('error', str(vision_data))}"

                raw = vision_data["message"]["content"]
                if "SEARCH_QUERY:" in raw:
                    parts = raw.split("SEARCH_QUERY:", 1)
                    image_analysis = parts[0].replace("ANALYSIS:", "").strip()
                    search_query = parts[1].strip().strip('"')
                else:
                    image_analysis = raw
                    search_query = raw.split("\n")[0][:100]

            await self._emit(__event_emitter__, f"Searching: {search_query[:50]}...")
            web_results = self._web_search(search_query)

            await self._emit(__event_emitter__, "Thinking...")
            if image_analysis:
                combined = f"Chart analysis:\n{image_analysis}\n\nLive web data:\n{web_results}\n\nUser question: {user_message}"
            else:
                combined = f"Live web data:\n{web_results}\n\nUser question: {user_message}"

            analysis_resp = requests.post(
                self.valves.reasoning_url + "/api/chat",
                json={
                    "model": self.valves.reasoning_model,
                    "messages": [
                        {
                            "role": "system",
                            "content": (
                                "You are a financial research analyst. "
                                "Provide thorough, well-structured analysis. "
                                "Structure: Summary → Observations → Analysis → Key Risks. "
                                "This is for research purposes only, not financial advice."
                            )
                        }
                    ] + clean_history + [{"role": "user", "content": combined}],
                    "stream": False
                },
                timeout=300
            )
            analysis_data = analysis_resp.json()
            if "message" not in analysis_data:
                await self._emit(__event_emitter__, "Error", done=True)
                return f"Analysis error: {analysis_data.get('error', str(analysis_data))}"
            await self._emit(__event_emitter__, "Done", done=True)
            return analysis_data["message"]["content"]

  # ===========================================================================
  # Vision Pipeline — deep image analysis with reasoning
  # qwen2.5vl:3b describes → deepseek-r1:14b reasons
  # ===========================================================================
  vision_pipeline.py: |
    import base64
    from typing import List
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "deepseek-r1:14b"

        def __init__(self):
            self.name = "Vision Pipeline (Describe → Reason)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        async def _emit(self, emitter, description, done=False):
            if emitter:
                await emitter({"type": "status", "data": {"description": description, "done": done}})

        async def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> str:
            images = self._resolve_images(messages)

            if not images:
                await self._emit(__event_emitter__, "Thinking...")
                clean = self._sanitize_messages(messages)
                resp = requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model, "messages": clean, "stream": False},
                    timeout=300
                )
                data = resp.json()
                if "message" not in data:
                    await self._emit(__event_emitter__, "Error", done=True)
                    return f"Error: {data.get('error', str(data))}"
                await self._emit(__event_emitter__, "Done", done=True)
                return data["message"]["content"]

            await self._emit(__event_emitter__, "Analyzing image...")
            vision_resp = requests.post(
                self.valves.vision_url + "/api/chat",
                json={
                    "model": self.valves.vision_model,
                    "messages": [{
                        "role": "user",
                        "content": (
                            "Describe this image in thorough detail. "
                            "Note all visible text, numbers, charts, patterns, and visual elements. "
                            "The user will ask: " + user_message
                        ),
                        "images": images
                    }],
                    "stream": False
                },
                timeout=120
            )
            vision_data = vision_resp.json()
            if "message" not in vision_data:
                await self._emit(__event_emitter__, "Error", done=True)
                return f"Vision error: {vision_data.get('error', str(vision_data))}"

            await self._emit(__event_emitter__, "Reasoning...")
            reasoning_resp = requests.post(
                self.valves.reasoning_url + "/api/chat",
                json={
                    "model": self.valves.reasoning_model,
                    "messages": [
                        {
                            "role": "system",
                            "content": (
                                "You are an analytical assistant. "
                                "An image has been described to you in detail. "
                                "Reason carefully through the content and answer the user's question thoroughly."
                            )
                        },
                        {
                            "role": "user",
                            "content": "Question: " + user_message + "\n\nImage description:\n" + vision_data["message"]["content"]
                        }
                    ],
                    "stream": False
                },
                timeout=300
            )
            reasoning_data = reasoning_resp.json()
            if "message" not in reasoning_data:
                await self._emit(__event_emitter__, "Error", done=True)
                return f"Reasoning error: {reasoning_data.get('error', str(reasoning_data))}"

            await self._emit(__event_emitter__, "Done", done=True)
            return (
                "### Visual Description  *(qwen2.5vl:3b)*\n\n"
                + vision_data["message"]["content"]
                + "\n\n---\n\n"
                + "### Analysis  *(deepseek-r1:14b)*\n\n"
                + reasoning_data["message"]["content"]
            )
{{- end }}
