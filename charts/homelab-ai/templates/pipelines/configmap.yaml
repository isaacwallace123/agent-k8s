{{- if .Values.pipelines.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipelines-code
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipelines
data:

  # ===========================================================================
  # Chat Pipeline — fast conversational chat with optional image support
  # No image: qwen2.5:7b streams
  # With image: qwen2.5vl:3b streams
  # ===========================================================================
  chat_pipeline.py: |
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            chat_url: str = "http://summarizer:11436"
            chat_model: str = "qwen2.5:7b"
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"

        def __init__(self):
            self.name = "Chat Pipeline (Vision → Chat)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def _stream_ollama(self, url: str, payload: dict) -> Generator[str, None, None]:
            with requests.post(url, json={**payload, "stream": True}, stream=True, timeout=(10, None)) as resp:
                for line in resp.iter_lines():
                    if not line:
                        continue
                    try:
                        data = json.loads(line)
                    except Exception:
                        continue
                    chunk = data.get("message", {}).get("content", "")
                    if chunk:
                        yield chunk
                    if data.get("done"):
                        break

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)
            clean_history = self._sanitize_messages(messages[:-1])
            system = {"role": "system", "content": "You are a helpful, friendly assistant. Answer clearly and conversationally."}

            if images:
                url = self.valves.vision_url + "/api/chat"
                payload = {
                    "model": self.valves.vision_model,
                    "messages": [system] + clean_history + [
                        {"role": "user", "content": user_message, "images": images}
                    ],
                    "options": {"num_ctx": 8192},
                }
            else:
                url = self.valves.chat_url + "/api/chat"
                payload = {
                    "model": self.valves.chat_model,
                    "messages": [system] + clean_history + [
                        {"role": "user", "content": user_message}
                    ],
                    "options": {"num_ctx": 16384},
                }

            if not want_stream:
                resp = requests.post(url, json={**payload, "stream": False}, timeout=300)
                data = resp.json()
                if "message" not in data:
                    return f"Error: {data.get('error', str(data))}"
                return data["message"]["content"]

            return self._stream_ollama(url, payload)

  # ===========================================================================
  # Coding Pipeline
  # No image:    deepseek-r1:7b streams plan → qwen2.5-coder:14b streams code
  # With image:  qwen2.5vl:3b describes (blocking) → qwen2.5-coder:14b streams code
  # ===========================================================================
  coding_pipeline.py: |
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"
            planner_url: str = "http://summarizer:11436"
            planner_model: str = "deepseek-r1:7b"
            coder_url: str = "http://llm:11434"
            coder_model: str = "qwen2.5-coder:14b"

        def __init__(self):
            self.name = "Coding Pipeline (Vision → Plan → Code)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _stream_llm(self, url: str, model: str, messages: list, num_ctx: int) -> Generator[str, None, None]:
            with requests.post(
                url + "/api/chat",
                json={"model": model, "messages": messages, "options": {"num_ctx": num_ctx}, "stream": True},
                stream=True, timeout=(10, None)
            ) as resp:
                for line in resp.iter_lines():
                    if not line:
                        continue
                    try:
                        data = json.loads(line)
                    except Exception:
                        continue
                    chunk = data.get("message", {}).get("content", "")
                    if chunk:
                        yield chunk
                    if data.get("done"):
                        break

        def _call_llm(self, url: str, model: str, messages: list, num_ctx: int) -> str:
            resp = requests.post(
                url + "/api/chat",
                json={"model": model, "messages": messages, "options": {"num_ctx": num_ctx}, "stream": False},
                timeout=300
            )
            data = resp.json()
            return data.get("message", {}).get("content", f"Error: {data.get('error', str(data))}")

        def _stream_plan_then_code(self, user_message: str) -> Generator[str, None, None]:
            plan_chunks = []
            yield "### Plan  *(deepseek-r1:7b)*\n\n"
            planner_messages = [
                {"role": "system", "content": "You are a senior software architect. Given a coding task, produce a concise numbered implementation plan. Do not write code — only plan the approach and structure."},
                {"role": "user", "content": user_message}
            ]
            for chunk in self._stream_llm(self.valves.planner_url, self.valves.planner_model, planner_messages, 4096):
                plan_chunks.append(chunk)
                yield chunk

            code_input = "Task: " + user_message + "\n\nImplementation Plan:\n" + "".join(plan_chunks)
            yield "\n\n---\n\n### Code  *(qwen2.5-coder:14b)*\n\n"

            coder_messages = [
                {"role": "system", "content": "You are an expert programmer. Implement the solution according to the provided context. Write complete, working code with clear comments."},
                {"role": "user", "content": code_input}
            ]
            yield from self._stream_llm(self.valves.coder_url, self.valves.coder_model, coder_messages, 16384)

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)

            if images:
                vision_resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [{
                            "role": "user",
                            "content": (
                                "Describe this image in full technical detail for a software developer. "
                                "Include all visible code, UI elements, error messages, diagrams, and text. "
                                "Task: " + user_message
                            ),
                            "images": images
                        }],
                        "options": {"num_ctx": 8192},
                        "stream": False
                    },
                    timeout=120
                )
                vision_data = vision_resp.json()
                if "message" not in vision_data:
                    return f"Vision error: {vision_data.get('error', str(vision_data))}"
                code_input = "Image context:\n" + vision_data["message"]["content"] + "\n\nTask: " + user_message
                coder_messages = [
                    {"role": "system", "content": "You are an expert programmer. Write complete, working code with clear comments."},
                    {"role": "user", "content": code_input}
                ]
                if not want_stream:
                    return self._call_llm(self.valves.coder_url, self.valves.coder_model, coder_messages, 16384)
                return self._stream_llm(self.valves.coder_url, self.valves.coder_model, coder_messages, 16384)

            else:
                if not want_stream:
                    plan = self._call_llm(
                        self.valves.planner_url, self.valves.planner_model,
                        [
                            {"role": "system", "content": "You are a senior software architect. Given a coding task, produce a concise numbered implementation plan. Do not write code."},
                            {"role": "user", "content": user_message}
                        ],
                        4096
                    )
                    code_input = "Task: " + user_message + "\n\nImplementation Plan:\n" + plan
                    return self._call_llm(
                        self.valves.coder_url, self.valves.coder_model,
                        [
                            {"role": "system", "content": "You are an expert programmer. Implement the solution according to the provided context. Write complete, working code with clear comments."},
                            {"role": "user", "content": code_input}
                        ],
                        16384
                    )
                return self._stream_plan_then_code(user_message)

  # ===========================================================================
  # Finance Pipeline
  # With image: qwen2.5vl:3b analyzes chart (blocking) → web search → deepseek-r1:14b streams
  # No image:   web search → deepseek-r1:14b streams
  # ===========================================================================
  finance_pipeline.py: |
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "deepseek-r1:14b"
            searxng_url: str = "http://searxng:8080/search"
            search_results: int = 5

        def __init__(self):
            self.name = "Finance Pipeline (Vision → Analysis)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def _web_search(self, query: str) -> str:
            try:
                resp = requests.get(
                    self.valves.searxng_url,
                    params={"q": query, "format": "json", "categories": "news,general"},
                    timeout=10
                )
                results = resp.json().get("results", [])[:self.valves.search_results]
                if not results:
                    return "No web results found."
                lines = []
                for r in results:
                    title = r.get("title", "")
                    content = r.get("content", "")
                    url = r.get("url", "")
                    lines.append(f"- {title}: {content} ({url})")
                return "\n".join(lines)
            except Exception as e:
                return f"Search failed: {e}"

        def _stream_reasoning(self, reasoning_messages: list) -> Generator[str, None, None]:
            with requests.post(
                self.valves.reasoning_url + "/api/chat",
                json={
                    "model": self.valves.reasoning_model,
                    "messages": reasoning_messages,
                    "options": {"num_ctx": 16384},
                    "stream": True
                },
                stream=True,
                timeout=(10, None)
            ) as resp:
                for line in resp.iter_lines():
                    if not line:
                        continue
                    try:
                        data = json.loads(line)
                    except Exception:
                        continue
                    chunk = data.get("message", {}).get("content", "")
                    if chunk:
                        yield chunk
                    if data.get("done"):
                        break

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)
            clean_history = self._sanitize_messages(messages[:-1])

            image_analysis = ""
            search_query = user_message

            if images:
                vision_resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [{
                            "role": "user",
                            "content": (
                                "Analyze this financial chart and respond in exactly two sections:\n\n"
                                "ANALYSIS: <concise analysis — ticker/company, current price, trend, key indicators>\n\n"
                                "SEARCH_QUERY: <one web search query to find current news and analyst sentiment>\n\n"
                                f"User question: {user_message}"
                            ),
                            "images": images
                        }],
                        "options": {"num_ctx": 8192},
                        "stream": False
                    },
                    timeout=120
                )
                vision_data = vision_resp.json()
                if "message" not in vision_data:
                    return f"Vision error: {vision_data.get('error', str(vision_data))}"

                raw = vision_data["message"]["content"]
                if "SEARCH_QUERY:" in raw:
                    parts = raw.split("SEARCH_QUERY:", 1)
                    image_analysis = parts[0].replace("ANALYSIS:", "").strip()
                    search_query = parts[1].strip().strip('"')
                else:
                    image_analysis = raw
                    search_query = raw.split("\n")[0][:100]

            web_results = self._web_search(search_query)

            if image_analysis:
                combined = f"Chart analysis:\n{image_analysis}\n\nLive web data:\n{web_results}\n\nUser question: {user_message}"
            else:
                combined = f"Live web data:\n{web_results}\n\nUser question: {user_message}"

            reasoning_messages = [
                {
                    "role": "system",
                    "content": (
                        "You are a financial research analyst. "
                        "Provide thorough, well-structured analysis. "
                        "Structure: Summary → Observations → Analysis → Key Risks. "
                        "This is for research purposes only, not financial advice."
                    )
                }
            ] + clean_history + [{"role": "user", "content": combined}]

            if not want_stream:
                resp = requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={
                        "model": self.valves.reasoning_model,
                        "messages": reasoning_messages,
                        "options": {"num_ctx": 16384},
                        "stream": False
                    },
                    timeout=300
                )
                data = resp.json()
                if "message" not in data:
                    return f"Analysis error: {data.get('error', str(data))}"
                return data["message"]["content"]

            return self._stream_reasoning(reasoning_messages)

  # ===========================================================================
  # Vision Pipeline — deep image analysis with reasoning
  # qwen2.5vl:3b describes (blocking) → deepseek-r1:14b streams reasoning
  # ===========================================================================
  vision_pipeline.py: |
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            vision_url: str = "http://summarizer:11436"
            vision_model: str = "qwen2.5vl:3b"
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "deepseek-r1:14b"

        def __init__(self):
            self.name = "Vision Pipeline (Describe → Reason)"
            self.valves = self.Valves()

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def _stream_reasoning(self, reasoning_messages: list) -> Generator[str, None, None]:
            with requests.post(
                self.valves.reasoning_url + "/api/chat",
                json={
                    "model": self.valves.reasoning_model,
                    "messages": reasoning_messages,
                    "options": {"num_ctx": 16384},
                    "stream": True
                },
                stream=True,
                timeout=(10, None)
            ) as resp:
                for line in resp.iter_lines():
                    if not line:
                        continue
                    try:
                        data = json.loads(line)
                    except Exception:
                        continue
                    chunk = data.get("message", {}).get("content", "")
                    if chunk:
                        yield chunk
                    if data.get("done"):
                        break

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)

            if not images:
                clean = self._sanitize_messages(messages)
                if not want_stream:
                    resp = requests.post(
                        self.valves.reasoning_url + "/api/chat",
                        json={"model": self.valves.reasoning_model, "messages": clean, "options": {"num_ctx": 16384}, "stream": False},
                        timeout=300
                    )
                    data = resp.json()
                    if "message" not in data:
                        return f"Error: {data.get('error', str(data))}"
                    return data["message"]["content"]
                return self._stream_reasoning(clean)

            vision_resp = requests.post(
                self.valves.vision_url + "/api/chat",
                json={
                    "model": self.valves.vision_model,
                    "messages": [{
                        "role": "user",
                        "content": (
                            "Describe this image in thorough detail. "
                            "Note all visible text, numbers, charts, patterns, and visual elements. "
                            "The user will ask: " + user_message
                        ),
                        "images": images
                    }],
                    "options": {"num_ctx": 8192},
                    "stream": False
                },
                timeout=120
            )
            vision_data = vision_resp.json()
            if "message" not in vision_data:
                return f"Vision error: {vision_data.get('error', str(vision_data))}"

            reasoning_messages = [
                {
                    "role": "system",
                    "content": (
                        "You are an analytical assistant. "
                        "An image has been described to you in detail. "
                        "Reason carefully through the content and answer the user's question thoroughly."
                    )
                },
                {
                    "role": "user",
                    "content": (
                        "Image description:\n" + vision_data["message"]["content"] +
                        "\n\nUser question: " + user_message
                    )
                }
            ]

            if not want_stream:
                resp = requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model, "messages": reasoning_messages, "options": {"num_ctx": 16384}, "stream": False},
                    timeout=300
                )
                data = resp.json()
                if "message" not in data:
                    return f"Error: {data.get('error', str(data))}"
                return data["message"]["content"]

            return self._stream_reasoning(reasoning_messages)

