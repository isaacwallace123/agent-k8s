{{- if .Values.pipelines.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipelines-code
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: pipelines
data:

  # ===========================================================================
  # Chat Pipeline — fast conversational chat with optional image support
  # No image: qwen2.5:7b streams
  # With image: qwen2.5vl:3b streams
  # ===========================================================================
  chat_pipeline.py: |
    import asyncio
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            chat_url: str = "http://summarizer:11436"
            chat_model: str = "qwen2.5:7b"
            vision_url: str = "http://llm:11434"
            vision_model: str = "qwen2.5vl:3b"

        def __init__(self):
            self.name = "Chat Pipeline (Vision → Chat)"
            self.valves = self.Valves()
            try:
                self._loop = asyncio.get_event_loop()
            except Exception:
                self._loop = None

        def _emit(self, emitter, description, done=False):
            if not emitter or not getattr(self, "_loop", None):
                return
            try:
                asyncio.run_coroutine_threadsafe(
                    emitter({"type": "status", "data": {"description": description, "done": done}}),
                    self._loop
                ).result(timeout=2)
            except Exception:
                pass

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)
            clean_history = self._sanitize_messages(messages[:-1])
            system = {"role": "system", "content": "You are a helpful, friendly assistant. Answer clearly and conversationally."}

            if images:
                url = self.valves.vision_url + "/api/chat"
                payload = {
                    "model": self.valves.vision_model,
                    "messages": [system] + clean_history + [
                        {"role": "user", "content": user_message, "images": images}
                    ],
                    "options": {"num_ctx": 16384},
                }
                if not want_stream:
                    resp = requests.post(url, json={**payload, "stream": False}, timeout=300)
                    data = resp.json()
                    return data.get("message", {}).get("content", f"Error: {data.get('error', str(data))}")

                def _gen():
                    self._emit(__event_emitter__, "Analyzing image...")
                    yield ""  # tick — fires status before blocking call
                    with requests.post(url, json={**payload, "stream": True}, stream=True, timeout=(10, None)) as resp:
                        for line in resp.iter_lines():
                            if not line:
                                continue
                            try:
                                data = json.loads(line)
                            except Exception:
                                continue
                            chunk = data.get("message", {}).get("content", "")
                            if chunk:
                                yield chunk
                            if data.get("done"):
                                break
                return _gen()

            else:
                url = self.valves.chat_url + "/api/chat"
                payload = {
                    "model": self.valves.chat_model,
                    "messages": [system] + clean_history + [
                        {"role": "user", "content": user_message}
                    ],
                    "options": {"num_ctx": 16384},
                }
                if not want_stream:
                    resp = requests.post(url, json={**payload, "stream": False}, timeout=300)
                    data = resp.json()
                    return data.get("message", {}).get("content", f"Error: {data.get('error', str(data))}")

                def _gen():
                    self._emit(__event_emitter__, "Thinking...")
                    yield ""
                    with requests.post(url, json={**payload, "stream": True}, stream=True, timeout=(10, None)) as resp:
                        for line in resp.iter_lines():
                            if not line:
                                continue
                            try:
                                data = json.loads(line)
                            except Exception:
                                continue
                            chunk = data.get("message", {}).get("content", "")
                            if chunk:
                                yield chunk
                            if data.get("done"):
                                break
                return _gen()

  # ===========================================================================
  # Coding Pipeline
  # No image:    deepseek-r1:7b streams plan → qwen2.5-coder:14b streams code
  # With image:  qwen2.5vl:3b describes (blocking) → qwen2.5-coder:14b streams code
  # ===========================================================================
  coding_pipeline.py: |
    import asyncio
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            # Stage 1: B50 Pro — vision + analysis + planning (qwen2.5vl:3b)
            analysis_url: str = "http://coding:11437"
            analysis_model: str = "qwen2.5vl:3b"
            # Stage 2: B580 — deep reasoning + implementation (qwen3:14b, thinking mode)
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "qwen3:14b"

        def __init__(self):
            self.name = "Coding Pipeline (Analyze → Plan → Implement)"
            self.valves = self.Valves()
            try:
                self._loop = asyncio.get_event_loop()
            except Exception:
                self._loop = None

        def _emit(self, emitter, description, done=False):
            if not emitter or not getattr(self, "_loop", None):
                return
            try:
                asyncio.run_coroutine_threadsafe(
                    emitter({"type": "status", "data": {"description": description, "done": done}}),
                    self._loop
                ).result(timeout=2)
            except Exception:
                pass

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _call_llm(self, url: str, model: str, messages: list, num_ctx: int) -> str:
            resp = requests.post(
                url + "/api/chat",
                json={"model": model, "messages": messages, "options": {"num_ctx": num_ctx}, "stream": False},
                timeout=300
            )
            data = resp.json()
            return data.get("message", {}).get("content", f"Error: {data.get('error', str(data))}")

        def _call_stage1(self, user_message: str, images: list, system: str) -> str:
            msgs = [{"role": "user", "content": user_message}]
            if images:
                msgs[0]["images"] = images
            resp = requests.post(
                self.valves.analysis_url + "/api/chat",
                json={"model": self.valves.analysis_model, "messages": [{"role": "system", "content": system}] + msgs,
                      "options": {"num_ctx": 16384}, "stream": False},
                timeout=300
            )
            data = resp.json()
            return data.get("message", {}).get("content", f"Stage 1 error: {data.get('error', str(data))}")

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)

            stage1_system = (
                "You are a senior software architect and visual analyst. Your job is Stage 1 of a two-stage pipeline.\n"
                "Analyze the user's request" + (" and the attached image/screenshot" if images else "") + ".\n"
                "Output:\n"
                "1. What you see / understand about the task\n"
                "2. A clear numbered implementation plan (architecture, files, data flow)\n"
                "Do NOT write code — only analyze and plan. Be concise and precise."
            )
            stage2_system = (
                "You are an expert software engineer. You receive a task + implementation plan from Stage 1.\n"
                "Your job: implement it completely. Write production-ready, working code with no stubs or TODOs.\n"
                "Think carefully before writing. Use the plan as your guide."
            )

            if not want_stream:
                self._emit(__event_emitter__, "Analyzing...")
                plan = self._call_stage1(user_message, images, stage1_system)
                stage2_input = f"Original task: {user_message}\n\nAnalysis & Plan:\n{plan}\n\nNow implement:"
                resp = requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model,
                          "messages": [{"role": "system", "content": stage2_system}, {"role": "user", "content": stage2_input}],
                          "options": {"num_ctx": 16384}, "stream": False},
                    timeout=300
                )
                data = resp.json()
                return data.get("message", {}).get("content", f"Stage 2 error: {data.get('error', str(data))}")

            def _gen():
                self._emit(__event_emitter__, "Analyzing & planning (B50 Pro)...")
                yield ""
                plan = self._call_stage1(user_message, images, stage1_system)
                yield "### Analysis & Plan\n\n" + plan + "\n\n---\n\n### Implementation\n\n"
                self._emit(__event_emitter__, "Implementing (B580, thinking mode)...")
                yield ""
                stage2_input = f"Original task: {user_message}\n\nAnalysis & Plan:\n{plan}\n\nNow implement:"
                with requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model,
                          "messages": [{"role": "system", "content": stage2_system}, {"role": "user", "content": stage2_input}],
                          "options": {"num_ctx": 16384}, "stream": True},
                    stream=True, timeout=(10, None)
                ) as resp:
                    for line in resp.iter_lines():
                        if not line:
                            continue
                        try:
                            data = json.loads(line)
                        except Exception:
                            continue
                        chunk = data.get("message", {}).get("content", "")
                        if chunk:
                            yield chunk
                        if data.get("done"):
                            break
            return _gen()

  # ===========================================================================
  # Finance Pipeline
  # Phase 1 (if image): qwen2.5vl:3b analyzes chart  → extract ticker + search query
  # Phase 2:            SearXNG web search            → live market data
  # Phase 3:            deepseek-r1:14b streams       → structured analysis
  #
  # For streaming: ALL work happens inside the generator so that yielding ""
  # before each blocking phase lets the event loop fire the status event first.
  # ===========================================================================
  finance_pipeline.py: |
    import asyncio
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            # Stage 1: B50 Pro — chart vision + search query extraction (qwen2.5vl:7b)
            vision_url: str = "http://coding:11437"
            vision_model: str = "qwen2.5vl:3b"
            # Stage 2: B580 — deep financial reasoning (qwen3:14b, thinking mode)
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "qwen3:14b"
            searxng_url: str = "http://searxng:8080/search"
            search_results: int = 5

        def __init__(self):
            self.name = "Finance Pipeline (Vision → Search → Analysis)"
            self.valves = self.Valves()
            try:
                self._loop = asyncio.get_event_loop()
            except Exception:
                self._loop = None

        def _emit(self, emitter, description, done=False):
            if not emitter or not getattr(self, "_loop", None):
                return
            try:
                asyncio.run_coroutine_threadsafe(
                    emitter({"type": "status", "data": {"description": description, "done": done}}),
                    self._loop
                ).result(timeout=2)
            except Exception:
                pass

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def _web_search(self, query: str) -> str:
            try:
                resp = requests.get(
                    self.valves.searxng_url,
                    params={"q": query, "format": "json", "categories": "news,general"},
                    timeout=10
                )
                results = resp.json().get("results", [])[:self.valves.search_results]
                if not results:
                    return "No web results found."
                lines = []
                for r in results:
                    title = r.get("title", "")
                    content = r.get("content", "")
                    url = r.get("url", "")
                    lines.append(f"- {title}: {content} ({url})")
                return "\n".join(lines)
            except Exception as e:
                return f"Search failed: {e}"

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)
            clean_history = self._sanitize_messages(messages[:-1])

            # ── stream=False: do all work synchronously, return string ────────
            if not want_stream:
                image_analysis = ""
                search_query = user_message
                if images:
                    vision_resp = requests.post(
                        self.valves.vision_url + "/api/chat",
                        json={
                            "model": self.valves.vision_model,
                            "messages": [{"role": "user", "content": (
                                "You are analyzing a financial chart.\n"
                                "Respond with exactly:\n"
                                "ANALYSIS: <company/ticker, price, trend>\n"
                                "SEARCH_QUERY: <short web search query for this stock>\n\n"
                                f"User question: {user_message}"
                            ), "images": images}],
                            "options": {"num_ctx": 16384}, "stream": False
                        }, timeout=300
                    )
                    vision_data = vision_resp.json()
                    if "message" not in vision_data:
                        return f"Vision error: {vision_data.get('error', str(vision_data))}"
                    raw = vision_data["message"]["content"]
                    if "SEARCH_QUERY:" in raw:
                        parts = raw.split("SEARCH_QUERY:", 1)
                        image_analysis = parts[0].replace("ANALYSIS:", "").strip()
                        search_query = parts[1].strip().strip('"').split("\n")[0].strip()
                    else:
                        image_analysis = raw.strip()
                        search_query = raw.strip().split("\n")[0][:80] + " stock news"
                web_results = self._web_search(search_query)
                combined = (f"Chart analysis:\n{image_analysis}\n\nLive web data:\n{web_results}\n\nUser question: {user_message}"
                            if image_analysis else
                            f"Live web data:\n{web_results}\n\nUser question: {user_message}")
                reasoning_messages = [
                    {"role": "system", "content": "You are a financial research analyst. Provide thorough, well-structured analysis. Structure: Summary → Observations → Analysis → Key Risks. This is for research purposes only, not financial advice."}
                ] + clean_history + [{"role": "user", "content": combined}]
                resp = requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model, "messages": reasoning_messages, "options": {"num_ctx": 16384}, "stream": False},
                    timeout=300
                )
                data = resp.json()
                return data.get("message", {}).get("content", f"Analysis error: {data.get('error', str(data))}")

            # ── stream=True: all work inside generator so statuses fire before
            #    each blocking step (yield "" gives the event loop one tick) ───
            def _gen():
                image_analysis = ""
                search_query = user_message

                # Phase 1: image analysis
                if images:
                    self._emit(__event_emitter__, "Analyzing image...")
                    yield ""  # event loop tick — status fires before vision call blocks
                    vision_resp = requests.post(
                        self.valves.vision_url + "/api/chat",
                        json={
                            "model": self.valves.vision_model,
                            "messages": [{"role": "user", "content": (
                                "You are analyzing a financial chart.\n"
                                "Respond with exactly:\n"
                                "ANALYSIS: <company/ticker, price, trend, key indicators>\n"
                                "SEARCH_QUERY: <short web search query, e.g. 'AMZN stock news 2025'>\n\n"
                                f"User question: {user_message}"
                            ), "images": images}],
                            "options": {"num_ctx": 16384}, "stream": False
                        }, timeout=300
                    )
                    vision_data = vision_resp.json()
                    if "message" not in vision_data:
                        yield f"Vision error: {vision_data.get('error', str(vision_data))}"
                        return
                    raw = vision_data["message"]["content"]
                    if "SEARCH_QUERY:" in raw:
                        parts = raw.split("SEARCH_QUERY:", 1)
                        image_analysis = parts[0].replace("ANALYSIS:", "").strip()
                        search_query = parts[1].strip().strip('"').split("\n")[0].strip()
                    else:
                        image_analysis = raw.strip()
                        search_query = raw.strip().split("\n")[0][:80] + " stock news"

                # Phase 2: web search
                self._emit(__event_emitter__, f"Searching: {search_query[:50]}...")
                yield ""  # event loop tick — status fires before search blocks
                web_results = self._web_search(search_query)

                # Phase 3: reasoning
                combined = (f"Chart analysis:\n{image_analysis}\n\nLive web data:\n{web_results}\n\nUser question: {user_message}"
                            if image_analysis else
                            f"Live web data:\n{web_results}\n\nUser question: {user_message}")
                reasoning_messages = [
                    {"role": "system", "content": "You are a financial research analyst. Provide thorough, well-structured analysis. Structure: Summary → Observations → Analysis → Key Risks. This is for research purposes only, not financial advice."}
                ] + clean_history + [{"role": "user", "content": combined}]
                self._emit(__event_emitter__, "Thinking...")
                yield ""  # event loop tick — status fires before LLM blocks
                with requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model, "messages": reasoning_messages, "options": {"num_ctx": 16384}, "stream": True},
                    stream=True, timeout=(10, None)
                ) as resp:
                    for line in resp.iter_lines():
                        if not line:
                            continue
                        try:
                            data = json.loads(line)
                        except Exception:
                            continue
                        chunk = data.get("message", {}).get("content", "")
                        if chunk:
                            yield chunk
                        if data.get("done"):
                            break
            return _gen()

  # ===========================================================================
  # Vision Pipeline — deep image analysis with reasoning
  # qwen2.5vl:3b describes (blocking) → deepseek-r1:14b streams reasoning
  # ===========================================================================
  vision_pipeline.py: |
    import asyncio
    import base64
    import json
    from typing import Generator, List, Union
    from pydantic import BaseModel
    import requests

    class Pipeline:
        class Valves(BaseModel):
            # Stage 1: B50 Pro — image description (qwen2.5vl:7b)
            vision_url: str = "http://coding:11437"
            vision_model: str = "qwen2.5vl:3b"
            # Stage 2: B580 — deep reasoning (qwen3:14b, thinking mode)
            reasoning_url: str = "http://llm:11434"
            reasoning_model: str = "qwen3:14b"

        def __init__(self):
            self.name = "Vision Pipeline (Describe → Reason)"
            self.valves = self.Valves()
            try:
                self._loop = asyncio.get_event_loop()
            except Exception:
                self._loop = None

        def _emit(self, emitter, description, done=False):
            if not emitter or not getattr(self, "_loop", None):
                return
            try:
                asyncio.run_coroutine_threadsafe(
                    emitter({"type": "status", "data": {"description": description, "done": done}}),
                    self._loop
                ).result(timeout=2)
            except Exception:
                pass

        def _resolve_images(self, messages: List[dict]) -> list:
            for msg in reversed(messages):
                content = msg.get("content", "")
                if not isinstance(content, list):
                    continue
                images = []
                for part in content:
                    if not isinstance(part, dict) or part.get("type") != "image_url":
                        continue
                    url = part.get("image_url", {}).get("url", "")
                    if not url:
                        continue
                    if url.startswith("data:"):
                        images.append(url.split(",", 1)[1] if "," in url else url)
                    elif url.startswith("http://") or url.startswith("https://"):
                        try:
                            r = requests.get(url, timeout=15)
                            images.append(base64.b64encode(r.content).decode())
                        except Exception:
                            pass
                if images:
                    return images
            return []

        def _sanitize_messages(self, messages: List[dict]) -> List[dict]:
            sanitized = []
            for msg in messages:
                content = msg.get("content", "")
                if isinstance(content, list):
                    text_parts = [
                        p.get("text", "") for p in content
                        if isinstance(p, dict) and p.get("type") == "text"
                    ]
                    text = " ".join(text_parts).strip()
                    if text:
                        sanitized.append({"role": msg["role"], "content": text})
                else:
                    sanitized.append(msg)
            return sanitized

        def pipe(self, user_message: str, model_id: str, messages: List[dict], body: dict, __event_emitter__=None) -> Union[str, Generator]:
            want_stream = body.get("stream", False)
            images = self._resolve_images(messages)

            if not images:
                clean = self._sanitize_messages(messages)
                if not want_stream:
                    resp = requests.post(
                        self.valves.reasoning_url + "/api/chat",
                        json={"model": self.valves.reasoning_model, "messages": clean, "options": {"num_ctx": 16384}, "stream": False},
                        timeout=300
                    )
                    data = resp.json()
                    return data.get("message", {}).get("content", f"Error: {data.get('error', str(data))}")

                def _gen_text():
                    self._emit(__event_emitter__, "Thinking...")
                    yield ""
                    with requests.post(
                        self.valves.reasoning_url + "/api/chat",
                        json={"model": self.valves.reasoning_model, "messages": clean, "options": {"num_ctx": 16384}, "stream": True},
                        stream=True, timeout=(10, None)
                    ) as resp:
                        for line in resp.iter_lines():
                            if not line:
                                continue
                            try:
                                data = json.loads(line)
                            except Exception:
                                continue
                            chunk = data.get("message", {}).get("content", "")
                            if chunk:
                                yield chunk
                            if data.get("done"):
                                break
                return _gen_text()

            # With image
            if not want_stream:
                vision_resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [{"role": "user", "content": "Describe this image in thorough detail. Note all visible text, numbers, charts, patterns, and visual elements. The user will ask: " + user_message, "images": images}],
                        "options": {"num_ctx": 16384}, "stream": False
                    }, timeout=300
                )
                vision_data = vision_resp.json()
                if "message" not in vision_data:
                    return f"Vision error: {vision_data.get('error', str(vision_data))}"
                reasoning_messages = [
                    {"role": "system", "content": "You are an analytical assistant. An image has been described to you in detail. Reason carefully through the content and answer the user's question thoroughly."},
                    {"role": "user", "content": "Image description:\n" + vision_data["message"]["content"] + "\n\nUser question: " + user_message}
                ]
                resp = requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model, "messages": reasoning_messages, "options": {"num_ctx": 16384}, "stream": False},
                    timeout=300
                )
                data = resp.json()
                return data.get("message", {}).get("content", f"Error: {data.get('error', str(data))}")

            def _gen_vision():
                self._emit(__event_emitter__, "Analyzing image...")
                yield ""
                vision_resp = requests.post(
                    self.valves.vision_url + "/api/chat",
                    json={
                        "model": self.valves.vision_model,
                        "messages": [{"role": "user", "content": "Describe this image in thorough detail. Note all visible text, numbers, charts, patterns, and visual elements. The user will ask: " + user_message, "images": images}],
                        "options": {"num_ctx": 16384}, "stream": False
                    }, timeout=300
                )
                vision_data = vision_resp.json()
                if "message" not in vision_data:
                    yield f"Vision error: {vision_data.get('error', str(vision_data))}"
                    return
                self._emit(__event_emitter__, "Reasoning...")
                yield ""
                reasoning_messages = [
                    {"role": "system", "content": "You are an analytical assistant. An image has been described to you in detail. Reason carefully through the content and answer the user's question thoroughly."},
                    {"role": "user", "content": "Image description:\n" + vision_data["message"]["content"] + "\n\nUser question: " + user_message}
                ]
                with requests.post(
                    self.valves.reasoning_url + "/api/chat",
                    json={"model": self.valves.reasoning_model, "messages": reasoning_messages, "options": {"num_ctx": 16384}, "stream": True},
                    stream=True, timeout=(10, None)
                ) as resp:
                    for line in resp.iter_lines():
                        if not line:
                            continue
                        try:
                            data = json.loads(line)
                        except Exception:
                            continue
                        chunk = data.get("message", {}).get("content", "")
                        if chunk:
                            yield chunk
                        if data.get("done"):
                            break
            return _gen_vision()

