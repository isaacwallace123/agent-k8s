{{- if .Values.llm.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: llm
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
spec:
  type: ClusterIP
  selector:
    {{- include "homelab-ai.selectorLabels" (dict "component" "llm" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.llm.port }}
      targetPort: http
      protocol: TCP
{{- end }}
