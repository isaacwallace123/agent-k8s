{{- if .Values.llm.enabled }}
---
# =============================================================================
# LLM — Main coding / chat model (Ollama)
# Scheduled on pve1 (Intel Arc B580 12GB)
# Model files stored on pve1 SATA SSD via PVC.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm
spec:
  # Single replica — one Ollama process manages the GPU context
  replicas: 1
  selector:
    matchLabels:
      {{- include "homelab-ai.selectorLabels" (dict "component" "llm" "context" .) | nindent 6 }}
  strategy:
    # Recreate so the GPU is fully released before the new pod starts
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "homelab-ai.selectorLabels" (dict "component" "llm" "context" .) | nindent 8 }}
    spec:
      nodeSelector:
        {{- include "homelab-ai.nodeSelectorPve1" . | nindent 8 }}
      {{- with .Values.llm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # render (993) + video (44) groups confirmed on k3s nodes.
      securityContext:
        supplementalGroups: {{ .Values.global.gpuGroups | toJson }}
        runAsUser: 0
        runAsGroup: 0

      containers:
        - name: ollama
          image: "{{ .Values.llm.image.repository }}:{{ .Values.llm.image.tag }}"
          imagePullPolicy: {{ .Values.llm.image.pullPolicy }}
          # ipex-llm-inference-cpp-xpu default CMD is /bin/bash (exits immediately).
          # Must source oneAPI env then run ollama serve explicitly.
          command: ["/bin/bash", "-c"]
          args: ["source /opt/intel/oneapi/setvars.sh --force && /usr/local/lib/python3.11/dist-packages/bigdl/cpp/libs/ollama/ollama serve"]

          # privileged gives level_zero access to /sys/class/drm for GPU enumeration
          securityContext:
            privileged: true

          ports:
            - name: http
              containerPort: {{ .Values.llm.port }}
              protocol: TCP

          env:
            {{- include "homelab-ai.envList" .Values.llm.env | nindent 12 }}

          resources:
            {{- toYaml .Values.llm.resources | nindent 12 }}

          volumeMounts:
            - name: model-storage
              mountPath: {{ .Values.llm.storage.mountPath }}
            - name: dri
              mountPath: /dev/dri
            - name: sysdrm
              mountPath: /sys/class/drm

          livenessProbe:
            httpGet:
              path: {{ .Values.llm.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.llm.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.llm.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.llm.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.llm.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.llm.probes.readiness.periodSeconds }}

      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: llm-models
        # Expose Intel Arc B580 GPU to the container for hardware-accelerated inference
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        # level_zero enumerates GPUs via /sys/class/drm — required for SYCL device discovery
        - name: sysdrm
          hostPath:
            path: /sys/class/drm
            type: Directory
{{- end }}
