{{- if .Values.postgres.enabled }}
---
# Postgres credentials Secret
# WARNING: Do NOT commit real passwords to git.
# Override postgres.auth.password in a values-secret.yaml (gitignored) or
# use an external secret manager (Vault, Sealed Secrets, ESO).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  # Full DSN for convenience — consumed by agent services
  DATABASE_URL: "postgresql://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@postgres.{{ .Values.global.namespace }}.svc.cluster.local:{{ .Values.postgres.port }}/{{ .Values.postgres.auth.database }}"
{{- end }}
