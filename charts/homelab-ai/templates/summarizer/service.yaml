{{- if .Values.summarizer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: summarizer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: summarizer
spec:
  type: ClusterIP
  selector:
    {{- include "homelab-ai.selectorLabels" (dict "component" "summarizer" "context" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.summarizer.port }}
      targetPort: http
      protocol: TCP
{{- end }}
