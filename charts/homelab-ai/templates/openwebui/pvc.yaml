{{- if and .Values.openwebui.enabled .Values.openwebui.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "homelab-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: openwebui
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ include "homelab-ai.storageClass" (dict "component" .Values.openwebui "context" .) }}
  resources:
    requests:
      storage: {{ .Values.openwebui.storage.size }}
{{- end }}
